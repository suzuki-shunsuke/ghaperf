---
name: integration test
on:
  workflow_call:
    secrets:
      TAKUMI_GUARD_BOT_ID:
        required: true
jobs:
  integration-test:
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1
        with:
          bot-id: ${{secrets.TAKUMI_GUARD_BOT_ID}}

      - run: |
          go install -ldflags "-X main.version=0.0.1-0 -X main.commit=$GITHUB_SHA -X main.date=$(date +"%Y-%m-%dT%H:%M:%SZ%:z" | tr -d '+')" ./cmd/ghaperf
      - run: ghaperf -v
      - run: ghaperf -h
      - run: ghaperf --log-file testdata/log.txt --threshold 1s
      - run: |
          run_id=$(gh run list -w test.yaml -s completed -L 1 --json databaseId -q ".[0].databaseId")
          ghaperf --repo "$GITHUB_REPOSITORY" --run-id "$run_id" --threshold 1s
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: |
          ghaperf --repo "$GITHUB_REPOSITORY" --workflow test.yaml --count 10 --threshold 1s
        env:
          GITHUB_TOKEN: ${{ github.token }}
